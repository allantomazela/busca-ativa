services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: busca-ativa-web:latest
    container_name: busca-ativa-web
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      VITE_APP_NAME: ${VITE_APP_NAME:-Busca Ativa Replay Sports}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:?Defina VITE_SUPABASE_URL (use --env-file .env.docker)}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:?Defina VITE_SUPABASE_PUBLISHABLE_KEY (use --env-file .env.docker)}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

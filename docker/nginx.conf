server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão para reduzir o tamanho de transferência.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # env.js é gerado em runtime e nunca deve ser cacheado, para que a troca de
    # ambiente (dev/homolog/prod) tenha efeito imediato.
    location = /env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Assets com hash no nome podem ser cacheados agressivamente.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback de SPA: qualquer rota desconhecida serve o index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cabeçalhos básicos de segurança.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
